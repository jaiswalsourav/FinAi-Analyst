services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
      - ai-service

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      AI_SERVICE_URL: http://ai-service:8001
    depends_on:
      - ai-service

  ai-service:
    build: ./ai-service
    ports:
      - "8001:8001"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
